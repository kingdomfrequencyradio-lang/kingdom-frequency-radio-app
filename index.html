<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b1830">
  <meta name="description" content="Listen live to Kingdom Frequency Radio — Tuned to Truth. Powered by the Word.">
  <title>Kingdom Frequency Radio</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <section class="card" aria-labelledby="station-title">
      <div class="brand-mark" aria-hidden="true">
        <div class="cross"></div>
        <div class="waves wave-one"></div>
        <div class="waves wave-two"></div>
      </div>

      <p class="eyebrow">LIVE CHRISTIAN RADIO</p>
      <h1 id="station-title">Kingdom Frequency Radio<span class="tm">™</span></h1>
      <p class="tagline">Tuned to Truth. Powered by the Word.</p>

      <div class="status" id="status" aria-live="polite">
        <span class="status-dot"></span>
        <span id="statusText">Ready to listen</span>
      </div>

      <audio id="radio" preload="none">
        <source src="https://stream.zeno.fm/6x0bwezlk70tv" type="audio/mpeg">
        Your browser does not support live audio.
      </audio>

      <button id="playButton" class="play-button" type="button" aria-label="Play Kingdom Frequency Radio">
        <span id="playIcon" class="play-icon">▶</span>
        <span id="playText">Listen Live</span>
      </button>

      <div class="volume-row">
        <label for="volume">Volume</label>
        <input id="volume" type="range" min="0" max="1" step="0.05" value="0.8">
      </div>

      <button id="installButton" class="secondary-button" type="button" hidden>
        Install App
      </button>

      <p class="ios-tip" id="iosTip" hidden>
        On iPhone: tap the Share button, then choose <strong>Add to Home Screen</strong>.
      </p>

      <nav class="links" aria-label="Kingdom Frequency Radio links">
        <a href="https://www.kingdomfrequencyradio.com" target="_blank" rel="noopener">Visit Website</a>
        <button id="shareButton" type="button">Share Station</button>
      </nav>

      <p class="scripture">“Faith comes from hearing, and hearing through the word of Christ.”<br><span>Romans 10:17 ESV</span></p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
